<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 52 52">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <style>
      .frame { fill: none; stroke: #333; stroke-width: 2; rx: 4; }
      .play { fill: #fff; }
      .arrow { fill: none; stroke: #06b6d4; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .cut { fill: none; stroke: #f59e0b; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <!-- Background rounded rect -->
  <rect x="2" y="2" width="48" height="48" rx="12" fill="url(#grad1)" />
  <!-- Video frame -->
  <rect x="8" y="12" width="22" height="16" rx="3" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
  <!-- Play button triangle -->
  <polygon class="play" points="16,16 16,24 23,20" />
  <!-- Flow arrow -->
  <path class="arrow" d="M32,20 L38,20" stroke="#fff" stroke-width="2"/>
  <polyline class="arrow" points="36,17 39,20 36,23" stroke="#fff" stroke-width="2"/>
  <!-- Scissors / Cut -->
  <circle cx="40" cy="16" r="3" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="40" cy="24" r="3" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="43" y1="16" x2="37" y2="24" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="43" y1="24" x2="37" y2="16" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- AI sparkle -->
  <text x="14" y="42" font-size="10" fill="#fff" font-weight="bold" font-family="sans-serif">AI Flow</text>
</svg>
